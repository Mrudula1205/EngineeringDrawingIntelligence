steps:
  # ── Backend ──────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/backend:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/backend:latest
      - .
    dir: .

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/backend:$SHORT_SHA
    waitFor: [build-backend]

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - doc-intelligence-backend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/backend:$SHORT_SHA
      - --region=us-central1
      - --allow-unauthenticated
    waitFor: [push-backend]

  # ── Frontend ─────────────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/frontend:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/frontend:latest
      - .
    dir: frontend

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/frontend:$SHORT_SHA
    waitFor: [build-frontend]

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - doc-intelligence-frontend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/doc-intelligence/frontend:$SHORT_SHA
      - --region=us-central1
      - --allow-unauthenticated
    waitFor: [push-frontend]

timeout: 1800s
