apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-intelligence
  labels:
    app: doc-intelligence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doc-intelligence
  template:
    metadata:
      labels:
        app: doc-intelligence
    spec:
      containers:
      - name: doc-intelligence
        image: us-central1-docker.pkg.dev/project-953fdbff-8291-4198-9c5/doc-intelligence/doc-intelligence:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        env:
        - name: PORT
          value: "8080"
        - name: GOOGLE_CLOUD_PROJECT
          value: "project-953fdbff-8291-4198-9c5"
        - name: GEMINI_TEXT_MODEL
          value: "gemini-1.5-flash"
        - name: GEMINI_DRAWING_MODEL
          value: "gemini-1.5-flash" 
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5